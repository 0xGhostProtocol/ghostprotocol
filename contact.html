<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Protocol | Secure Comms</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">GHOST_PROTOCOL</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="roadmap.html">My Roadmap</a></li>
            <li><a href="about.html">About Me</a></li>
            <li><a href="contact.html">Contact Us</a></li>
        </ul>
    </nav>

    <div class="terminal-container" style="margin-top: 50px;">
        <header>
            <h1 class="glitch">> SECURE_CHANNEL</h1>
        </header>

        <main>
            <section class="console-box">
                <div class="terminal-body" style="text-align: center;">
                    <p style="color:#ccc; margin-bottom: 30px;">
                        Need to establish a connection? Drop a transmission below. All logs are recorded.
                    </p>
                    
                    <!-- Yeh form direct tere email par message bhejega (Tujhe bas apna email dalna hai) -->
                    <form action="mailto:YOUR_EMAIL@gmail.com" method="post" enctype="text/plain" style="display: flex; flex-direction: column; gap: 15px; max-width: 400px; margin: 0 auto;">
                        
                        <input type="text" name="Alias" placeholder="Enter Your Alias/Name" required style="padding: 10px; background: #222; border: 1px solid #00ff00; color: #00ff00; font-family: 'Courier New';">
                        
                        <input type="email" name="Email" placeholder="Return Email Address" required style="padding: 10px; background: #222; border: 1px solid #00ff00; color: #00ff00; font-family: 'Courier New';">
                        
                        <textarea name="Message" rows="5" placeholder="Encrypt your message here..." required style="padding: 10px; background: #222; border: 1px solid #00ff00; color: #00ff00; font-family: 'Courier New'; resize: none;"></textarea>
                        
                        <button type="submit" class="follow-btn" style="width: 100%;">SEND_TRANSMISSION</button>
                    </form>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
